---
- name: Install Plex and HDR packages.
  hosts: proxmox-plex
  become: true

  tasks:
    - name: Update repositories cache and install additional packages
      ansible.builtin.apt:
        pkg:
          - ocl-icd-libopencl1
            # below should be commented back in when it's available on 22.04
          # - beignet-opencl-icd
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Install Plex
      ansible.builtin.apt:
        deb: https://downloads.plex.tv/plex-media-server-new/1.43.1.10611-1e34174b1/debian/plexmediaserver_1.43.1.10611-1e34174b1_amd64.deb
